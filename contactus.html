<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Carolina Homepage</title>
    <link rel="icon" type="image/jpg" href="favicon.jpg">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>South Carolina</h1>
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="columbia.html">Columbia</a></li>
            <li><a href="charleston.html">Charleston</a></li>
            <li><a href="myrtlebeach.html">Myrtle Beach</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
    </nav>

    <section id="section_home">
        <h2>Contact Us</h2>
        <img src="images/contactus.jpg" alt="Contact Us" class="contact-image">

        <form id="userForm">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" placeholder="Enter your first name" required><br><br>
            
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required><br><br>
            
            <label for="emailAddress">Email Address:</label>
            <input type="email" id="emailAddress" name="emailAddress" placeholder="Enter your email address" required><br><br>
            
            <label for="confirmEmail">Confirm Email:</label>
            <input type="email" id="confirmEmail" name="confirmEmail" placeholder="Re-enter your email address" required><br><br>
            
            <label for="question">Ask a Question:</label>
            <textarea id="question" name="question" placeholder="Type your question here" rows="4" cols="50" required></textarea><br><br>
            
            <button type="submit">Submit</button>
        </form>
    </section>

    <!--This is the footer/citation section-->
    <footer class="citations">
        <h3>Refrences</h3>
        <p>Contact us. Gospel Outreach Center. (n.d.). https://gospeloutreachcenter.church/contact </p>
        <a href="https://gospeloutreachcenter.church/contact" target="_blank">Contact Us Image</a>
    </footer>
</body>
</html>
